<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FAST Grocery CRM</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body class="bg-black text-white">

<div class="min-h-screen flex items-center justify-center" id="app">
  <div class="bg-gray-900 p-6 rounded-xl w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-4">FAST Grocery CRM</h1>

    <!-- LOGIN -->
    <div id="loginBox">
      <input id="email" class="w-full p-2 mb-2 bg-black border border-gray-700" placeholder="Email">
      <input id="password" type="password" class="w-full p-2 mb-2 bg-black border border-gray-700" placeholder="Password">

      <button onclick="login()" class="w-full bg-green-600 p-2 rounded">
        Login
      </button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
      
      <p class="mb-2">👋 Welcome Admin</p>

      <div class="grid grid-cols-2 gap-2">
        <div class="bg-gray-800 p-3 rounded">
          <p>Total Customers</p>
          <h2 id="customers">0</h2>
        </div>

        <div class="bg-gray-800 p-3 rounded">
          <p>Total Orders</p>
          <h2 id="orders">0</h2>
        </div>
      </div>

      <hr class="my-4 border-gray-700"/>

      <h2 class="font-bold mb-2">Add Customer</h2>

      <input id="cname" class="w-full p-2 mb-2 bg-black border border-gray-700" placeholder="Name">
      <input id="cphone" class="w-full p-2 mb-2 bg-black border border-gray-700" placeholder="Phone">

      <button onclick="addCustomer()" class="w-full bg-blue-600 p-2 rounded">
        Save Customer
      </button>

      <button onclick="logout()" class="w-full mt-3 bg-red-600 p-2 rounded">
        Logout
      </button>

    </div>

  </div>
</div>

<script>
// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ---------------- LOGIN ----------------
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=> {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadStats();
  })
  .catch(err => alert(err.message));
}

// ---------------- LOGOUT ----------------
function logout(){
  auth.signOut().then(()=> location.reload());
}

// ---------------- CUSTOMER ADD ----------------
function addCustomer(){
  const name = document.getElementById("cname").value;
  const phone = document.getElementById("cphone").value;

  db.collection("customers").add({
    name,
    phone,
    totalOrders: 0,
    totalSpent: 0,
    createdAt: new Date()
  });

  alert("Customer Added!");
  loadStats();
}

// ---------------- STATS ----------------
function loadStats(){

  db.collection("customers").get().then(snap=>{
    document.getElementById("customers").innerText = snap.size;
  });

  db.collection("orders").get().then(snap=>{
    document.getElementById("orders").innerText = snap.size;
  });
}

// ---------------- AUTH STATE ----------------
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadStats();
  }
});
</script>

</body>
</html>
