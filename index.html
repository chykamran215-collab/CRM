<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery CRM - Firebase Edition</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlU2uxRP6cITHhrm_BX3-NzW4ybqQhseg",
            authDomain: "crm-4b389.firebaseapp.com",
            projectId: "crm-4b389",
            storageBucket: "crm-4b389.firebasestorage.app",
            messagingSenderId: "1024129211358",
            appId: "1:1024129211358:web:340bdd3ddd39b9bdc29b4f",
            measurementId: "G-8R887T40N1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Window-তে এক্সপোজ করে দিচ্ছি যাতে React অ্যাপ থেকে অ্যাক্সেস করা যায়
        window.db = db;
        window.firestoreDoc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // এখানে আপনার মূল CRM এর Logic বসবে।
        // শুধু 'window.storage.get' এর জায়গায় নিচের মতো Firestore ফাংশন কল করতে হবে:
        
        const saveToCloud = async (data) => {
            try {
                await window.setDoc(window.firestoreDoc(window.db, "crm_data", "main_db"), data);
            } catch (e) {
                console.error("Firebase Error: ", e);
            }
        };

        const App = () => {
            return (
                <div style={{ padding: '20px', fontFamily: 'Arial' }}>
                    <h1>CRM লোড হয়েছে</h1>
                    <p>Firebase এর সাথে কানেক্টেড। এখন আপনার আগের কোডটি এই App কম্পোনেন্টের ভেতর বসিয়ে দিন।</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
